<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AdCRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        body { background-color: #0a0a0a; }
        .sidebar { background: #111111; border-right: 1px solid #1a1a1a; transition: width 0.3s ease; width: 240px; }
        .sidebar.collapsed { width: 64px; }
        .sidebar.collapsed .nav-label, .sidebar.collapsed .logo-text { display: none; }
        .nav-item { color: #525252; transition: color 0.2s, background 0.2s; border-radius: 8px; }
        .nav-item:hover { color: #e5e5e5; background: #1a1a1a; }
        .nav-item.active { color: #10b981; background: rgba(16,185,129,0.08); }
        .card { background: #111111; border: 1px solid #1a1a1a; border-radius: 16px; }
        .stat-value { color: #e5e5e5; font-size: 2rem; font-weight: 600; }
        .stat-label { color: #525252; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .logo-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 12px rgba(16,185,129,0.6); }
        .topbar { background: #0a0a0a; border-bottom: 1px solid #1a1a1a; }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-white">

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Main -->
<div class="flex-1 flex flex-col overflow-hidden">

    <!-- Topbar -->
    <header class="topbar flex items-center justify-between px-6 py-4">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-neutral-500 hover:text-white transition">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="text-neutral-400 text-sm">Dashboard</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-emerald-500 flex items-center justify-center text-black text-xs font-bold">A</div>
            <span class="text-neutral-400 text-sm">Admin</span>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">

        <div class="mb-8">
            <h1 class="text-white text-2xl font-semibold tracking-tight">Overview</h1>
            <p class="text-neutral-500 text-sm mt-1">Agency performance at a glance</p>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="card p-5">
                <p class="stat-label mb-3">Total Clients</p>
                <p class="stat-value" th:text="${totalClients}">0</p>
            </div>
            <div class="card p-5">
                <p class="stat-label mb-3">Active Clients</p>
                <p class="stat-value text-emerald-400" th:text="${activeClients}">0</p>
            </div>
            <div class="card p-5">
                <p class="stat-label mb-3">Total Revenue</p>
                <p class="stat-value text-emerald-400" th:text="'₹' + ${totalRevenue}">₹0</p>
            </div>
            <div class="card p-5">
                <p class="stat-label mb-3">Pending Payments</p>
                <p class="stat-value text-red-400" th:text="'₹' + ${pendingPayments}">₹0</p>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-3 gap-4">
            <div class="card p-5 col-span-2">
                <p class="stat-label mb-4">Monthly Revenue</p>
                <canvas id="revenueChart" height="100"></canvas>
            </div>
            <div class="card p-5">
                <p class="stat-label mb-4">Leads Generated</p>
                <canvas id="leadsChart" height="200"></canvas>
            </div>
        </div>

    </main>
</div>

</body>

<script th:inline="javascript">
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    const monthLabels = /*[[${monthLabels}]]*/ [];
    const revenueData = /*[[${revenueData}]]*/ [];
    const leadsData   = /*[[${leadsData}]]*/ [];

    new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
            labels: monthLabels,
            datasets: [{
                data: revenueData,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16,185,129,0.06)',
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                borderWidth: 2
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: '#1a1a1a' }, ticks: { color: '#525252' } },
                y: { grid: { color: '#1a1a1a' }, ticks: { color: '#525252' } }
            }
        }
    });

    new Chart(document.getElementById('leadsChart'), {
        type: 'bar',
        data: {
            labels: monthLabels,
            datasets: [{
                data: leadsData,
                backgroundColor: 'rgba(16,185,129,0.15)',
                borderColor: '#10b981',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: '#1a1a1a' }, ticks: { color: '#525252' } },
                y: { grid: { color: '#1a1a1a' }, ticks: { color: '#525252' } }
            }
        }
    });
</script>
</html>
