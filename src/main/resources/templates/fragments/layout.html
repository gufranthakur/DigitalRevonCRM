<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar">
    <aside class="sidebar flex flex-col h-full" id="sidebar">

        <!-- Logo -->
        <div class="flex items-center gap-3 px-4 py-5 border-b border-neutral-800">
            <div class="logo-dot flex-shrink-0"></div>
            <span class="logo-text font-semibold tracking-tight">AdCRM</span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 p-3 flex flex-col gap-1 mt-2">
            <a href="/dashboard" class="nav-item active flex items-center gap-3 px-3 py-2.5 text-sm font-medium">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="flex-shrink-0"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="/clients" class="nav-item flex items-center gap-3 px-3 py-2.5 text-sm font-medium">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="flex-shrink-0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="nav-label">Clients</span>
            </a>
            <a href="/invoices" class="nav-item flex items-center gap-3 px-3 py-2.5 text-sm font-medium">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="flex-shrink-0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span class="nav-label">Invoices</span>
            </a>
            <a href="/reports" class="nav-item flex items-center gap-3 px-3 py-2.5 text-sm font-medium">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="flex-shrink-0"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span class="nav-label">Reports</span>
            </a>
        </nav>

        <!-- Logout -->
        <div class="p-3 border-t border-neutral-800">
            <form action="/logout" method="post">

                <button class="nav-item w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="flex-shrink-0"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span class="nav-label">Logout</span>
                </button>
            </form>
        </div>
    </aside>
</div>

<div th:fragment="topbar">
    <!-- your topbar HTML here -->
</div>

</body>
</html>
